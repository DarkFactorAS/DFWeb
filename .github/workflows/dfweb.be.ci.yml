name: DFWeb BootStrap - CI Docker Container

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: darkfactorwebimage

jobs:
  build:
    name: Build Docker Image
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: DarkFactorAS/Infrastructure/.github/workflows/infrastructure-server-ci.yml@v1.6
    with:
      project_name: "DFWeb.FR.BootStrap"
      dockerfile: "DFWeb.FR.BootStrap/Dockerfile"
    secrets: inherit

  unit-tests:
    name: Run Unit Tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Configure DarkFactorAS NuGet source for tests
        run: dotnet nuget update source DarkFactorAS --username ${{ vars.NUGET_USERNAME }} --password ${{ secrets.NUGET_TOKEN }} --store-password-in-clear-text --configfile "DFWeb.BE/NuGet.config"

      - name: Restore backend unit tests
        run: dotnet restore DFWeb.BE.Tests/DFWeb.BE.Tests.csproj --configfile DFWeb.BE/NuGet.config

      - name: Restore frontend unit tests
        run: dotnet restore DFWeb.FR.Tests/DFWeb.FR.Tests.csproj --configfile DFWeb.BE/NuGet.config

      - name: Run backend unit tests
        run: dotnet test DFWeb.BE.Tests/DFWeb.BE.Tests.csproj --configuration Release --no-restore

      - name: Run frontend unit tests
        run: dotnet test DFWeb.FR.Tests/DFWeb.FR.Tests.csproj --configuration Release --no-restore