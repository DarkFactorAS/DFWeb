#
# Build Deploy file for Docker container
# Change the variables in this section to match your project
#

name: DFWeb BootStrap - Deploy

defaults:
  run:
    working-directory: .

on:
  release:
    types: [published]

  pull_request:
    types: [closed]
    branches: ["master", "main"]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:

  staging:
    if: github.event.pull_request.merged == true || github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'production'
    name: Deploy to Staging
    uses: DarkFactorAS/Infrastructure/.github/workflows/infrastructure-server-deploy.yml@v1.6
    with:
      environment: staging
      external_port: 8500
      project_name: "DFWeb.FR.BootStrap"
      dockerfile: "DFWeb.FR.BootStrap/Dockerfile"
      versionfile: "DFWeb.FR.BootStrap/Program.cs"
      config_path: "/DFWeb.FR.BootStrap"
    secrets: inherit

  production:
    if: github.event.pull_request.merged == true || github.event.inputs.environment == 'production' || github.event_name == 'release'
    name: Deploy to Production
    needs: [staging]
    uses: DarkFactorAS/Infrastructure/.github/workflows/infrastructure-server-deploy.yml@v1.6
    with:
      environment: production
      external_port: 9500
      project_name: "DFWeb.FR.BootStrap"
      dockerfile: "DFWeb.FR.BootStrap/Dockerfile"
      versionfile: "DFWeb.FR.BootStrap/Program.cs"
      config_path: "/DFWeb.FR.BootStrap"
    secrets: inherit
